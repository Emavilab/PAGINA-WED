services:
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pagina_wed_web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html/PAGINA WED
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: pagina_wed_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: negocio_web
      MYSQL_USER: controlplus
      MYSQL_PASSWORD: controlplus123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/negocio_web.sql:/docker-entrypoint-initdb.d/01_negocio_web.sql:ro

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: pagina_wed_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  db_data:
